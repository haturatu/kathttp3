jdk:
  - openjdk17

before_install:
  # JitPack's build image runs this as root and does not provide sudo.
  - apt-get update -qq
  - apt-get install -y cmake ninja-build
  - chmod +x gradlew
  - chmod +x scripts/build-android-deps.sh

install:
  - ./gradlew :kathttp:publishReleasePublicationToMavenLocal --stacktrace --no-daemon
