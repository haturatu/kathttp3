jdk:
  - openjdk17

before_install:
  # JitPack runs builds without apt privileges.  The dependency script uses
  # sdkmanager to install the pinned Android CMake package when needed.
  - chmod +x gradlew
  - chmod +x scripts/build-android-deps.sh

install:
  - ./gradlew :kathttp3:publishReleasePublicationToMavenLocal --stacktrace --no-daemon
