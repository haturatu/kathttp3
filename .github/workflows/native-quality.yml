name: Native Quality

on:
  push:
    paths:
      - "src/**/*.c"
      - "src/**/*.cc"
      - "src/**/*.cpp"
      - "src/**/*.h"
      - "src/**/*.hpp"
      - "include/**"
      - "tests/**"
      - "CMakeLists.txt"
      - ".clang-format"
      - ".clang-tidy"
      - "scripts/build-android-deps.sh"
      - "third_party/versions.env"
      - "third_party/versions.cmake"
      - "build.gradle.kts"
      - "kathttp3/build.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "gradle/wrapper/**"
      - ".github/workflows/native-quality.yml"
  pull_request:
    paths:
      - "src/**/*.c"
      - "src/**/*.cc"
      - "src/**/*.cpp"
      - "src/**/*.h"
      - "src/**/*.hpp"
      - "include/**"
      - "tests/**"
      - "CMakeLists.txt"
      - ".clang-format"
      - ".clang-tidy"
      - "scripts/build-android-deps.sh"
      - "third_party/versions.env"
      - "third_party/versions.cmake"
      - "build.gradle.kts"
      - "kathttp3/build.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "gradle/wrapper/**"
      - ".github/workflows/native-quality.yml"

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Install clang-format
        run: sudo apt-get update -qq && sudo apt-get install -y clang-format
      - name: Check native formatting
        run: >-
          find src include tests -type f ! -name ca_bundle.h \( -name '*.cc' -o -name '*.cpp' -o -name '*.c' -o -name '*.h' -o -name '*.hpp' \) -print0 |
          xargs -0 clang-format --dry-run --Werror

  static-analysis:
    runs-on: ubuntu-24.04
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - name: Restore Android SDK packages
        uses: actions/cache@v6
        with:
          path: |
            ~/.android/cache
            /usr/local/lib/android/sdk/ndk/27.0.12077973
            /usr/local/lib/android/sdk/cmake/3.22.1
          key: android-sdk-${{ runner.os }}-api36-ndk27.0.12077973-cmake3.22.1
      - name: Install Android SDK packages
        run: >-
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          "ndk;27.0.12077973" "cmake;3.22.1"
      - name: Restore pinned native dependency sources
        uses: actions/cache@v6
        with:
          path: third_party/src
          key: android-native-sources-${{ runner.os }}-${{ hashFiles('third_party/versions.env') }}
      - name: Restore pinned native dependency headers
        uses: actions/cache@v6
        with:
          path: third_party/android-deps/x86_64
          key: android-native-deps-${{ runner.os }}-x86_64-api26-ndk27.0.12077973-${{ hashFiles('scripts/build-android-deps.sh', 'third_party/versions.env', 'third_party/versions.cmake') }}
      - name: Build pinned analysis dependencies
        run: ./gradlew --parallel buildAndroidNativeDeps -PandroidNativeDepsAbi=x86_64 -PandroidNativeDepsJobs=2
      - name: Install static analysis tools
        run: >-
          sudo apt-get update -qq && sudo apt-get install -y
          clang clang-tidy cppcheck cmake ninja-build
      - name: Generate native compilation database
        run: >-
          cmake -S . -B build-tidy -G Ninja
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DKATHTTP3_ANALYSIS_ONLY=ON
          -DKATHTTP3_ANALYSIS_DEPS_INCLUDE_DIR=${{ github.workspace }}/third_party/android-deps/x86_64/include
          -DKATHTTP3_BUILD_JNI=OFF
      - parallel:
          - name: Run clang-tidy
            run: run-clang-tidy -p build-tidy -quiet
          - name: Run cppcheck
            run: >-
              cppcheck --project=build-tidy/compile_commands.json
              --enable=warning,performance,portability
              --inline-suppr --suppress=missingIncludeSystem
              --error-exitcode=1
          - name: Report cppcheck style recommendations
            run: >-
              cppcheck --project=build-tidy/compile_commands.json
              --enable=style --inline-suppr --suppress=missingIncludeSystem || true

  sanitizers:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Install CMake and Ninja
        run: sudo apt-get update -qq && sudo apt-get install -y cmake ninja-build
      - name: Build and run core tests with ASan and UBSan
        run: >-
          cmake -S . -B build-sanitize -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DKATHTTP3_ANALYSIS_ONLY=ON
          -DKATHTTP3_SANITIZE=ON
          -DKATHTTP3_BUILD_JNI=OFF &&
          cmake --build build-sanitize --parallel &&
          ctest --test-dir build-sanitize --output-on-failure
