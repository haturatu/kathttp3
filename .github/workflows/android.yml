name: Android

on:
  push:
    paths:
      - "example/**"
      - "kathttp3/**"
      - "src/**"
      - "include/**"
      - "CMakeLists.txt"
      - "settings.gradle.kts"
      - "build.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "gradle/wrapper/**"
      - "scripts/build-android-deps.sh"
      - "third_party/versions.env"
      - "third_party/versions.cmake"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "example/**"
      - "kathttp3/**"
      - "src/**"
      - "include/**"
      - "CMakeLists.txt"
      - "settings.gradle.kts"
      - "build.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "gradle/wrapper/**"
      - "scripts/build-android-deps.sh"
      - "third_party/versions.env"
      - "third_party/versions.cmake"
      - ".github/workflows/android.yml"

jobs:
  example:
    runs-on: ubuntu-24.04
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    strategy:
      fail-fast: false
      matrix:
        abi:
          - arm64-v8a
          - armeabi-v7a
          - x86_64
          - x86
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
      - name: Restore Android SDK packages
        uses: actions/cache@v6
        with:
          path: |
            ~/.android/cache
            /usr/local/lib/android/sdk/ndk/27.0.12077973
            /usr/local/lib/android/sdk/cmake/3.22.1
            /usr/local/lib/android/sdk/platforms/android-36
            /usr/local/lib/android/sdk/build-tools/36.0.0
          key: android-sdk-${{ runner.os }}-api36-ndk27.0.12077973-cmake3.22.1
      - name: Install Android SDK packages
        run: >-
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          "platforms;android-36" "build-tools;36.0.0" "ndk;27.0.12077973" "cmake;3.22.1"
      - name: Restore pinned native dependency sources
        uses: actions/cache@v6
        with:
          path: third_party/src
          key: android-native-sources-${{ runner.os }}-${{ hashFiles('third_party/versions.env') }}
      - name: Restore pinned native dependencies (${{ matrix.abi }})
        uses: actions/cache@v6
        with:
          # Build directories are intentionally excluded: CMake regenerates them.
          path: third_party/android-deps
          key: android-native-deps-${{ runner.os }}-${{ matrix.abi }}-api26-ndk27.0.12077973-${{ hashFiles('scripts/build-android-deps.sh', 'third_party/versions.env', 'third_party/versions.cmake') }}
      - name: Build pinned native dependencies
        run: ./gradlew --parallel buildAndroidNativeDeps -PandroidNativeDepsAbi=${{ matrix.abi }} -PandroidNativeDepsJobs=2
      - name: Build example APK (${{ matrix.abi }})
        run: ./gradlew --parallel :example:assembleDebug -Pkathttp3Abis=${{ matrix.abi }} -PandroidNativeDepsAbi=${{ matrix.abi }} -PandroidNativeDepsJobs=2
      - uses: actions/upload-artifact@v7
        with:
          name: kathttp3-example-${{ matrix.abi }}-debug
          path: example/build/outputs/apk/debug/example-debug.apk
