name: Android

on:
  push:
  pull_request:

jobs:
  arm64-example:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
      - uses: android-actions/setup-android@v3
      - name: Restore Android SDK packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/cache
            /usr/local/lib/android/sdk/ndk/27.0.12077973
            /usr/local/lib/android/sdk/cmake/3.22.1
            /usr/local/lib/android/sdk/platforms/android-36
            /usr/local/lib/android/sdk/build-tools/36.0.0
          key: android-sdk-${{ runner.os }}-api36-ndk27.0.12077973-cmake3.22.1
      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.0.12077973" "cmake;3.22.1"
      - name: Restore pinned native dependency sources
        uses: actions/cache@v4
        with:
          path: third_party/src
          key: android-native-sources-${{ runner.os }}-${{ hashFiles('third_party/versions.env') }}
      - name: Restore pinned arm64 native dependencies
        uses: actions/cache@v4
        with:
          # Build directories are intentionally excluded: CMake regenerates them.
          path: third_party/android-deps
          key: android-native-deps-${{ runner.os }}-arm64-v8a-api26-ndk27.0.12077973-${{ hashFiles('scripts/build-android-deps.sh', 'third_party/versions.env', 'third_party/versions.cmake') }}
      - name: Build pinned native dependencies
        run: ./gradlew buildAndroidNativeDeps -PandroidNativeDepsAbi=arm64-v8a
      - name: Build example APK
        run: ./gradlew :example:assembleDebug -PkathttpAbis=arm64-v8a -PandroidNativeDepsAbi=arm64-v8a
      - uses: actions/upload-artifact@v4
        with:
          name: kathttp-example-arm64-debug
          path: example/build/outputs/apk/debug/example-debug.apk
