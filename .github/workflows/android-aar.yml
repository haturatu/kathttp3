name: Android AAR

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "kathttp/**"
      - "src/**"
      - "include/**"
      - "CMakeLists.txt"
      - "settings.gradle.kts"
      - "build.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "gradle/wrapper/**"
      - "scripts/build-android-deps.sh"
      - "third_party/versions.env"
      - "third_party/versions.cmake"
      - ".github/workflows/android-aar.yml"
  pull_request:
    paths:
      - "kathttp/**"
      - "src/**"
      - "include/**"
      - "CMakeLists.txt"
      - "settings.gradle.kts"
      - "build.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "gradle/wrapper/**"
      - "scripts/build-android-deps.sh"
      - "third_party/versions.env"
      - "third_party/versions.cmake"
      - ".github/workflows/android-aar.yml"

permissions:
  contents: read

jobs:
  aar:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Restore Android SDK packages
        uses: actions/cache@v6
        with:
          path: |
            ~/.android/cache
            /usr/local/lib/android/sdk/ndk/27.0.12077973
            /usr/local/lib/android/sdk/cmake/3.22.1
            /usr/local/lib/android/sdk/platforms/android-36
            /usr/local/lib/android/sdk/build-tools/36.0.0
          key: android-sdk-${{ runner.os }}-api36-ndk27.0.12077973-cmake3.22.1

      - name: Install NDK and CMake
        run: |
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.0.12077973" \
            "cmake;3.22.1"

      - name: Restore pinned native dependency sources
        uses: actions/cache@v6
        with:
          path: third_party/src
          key: android-native-sources-${{ runner.os }}-${{ hashFiles('third_party/versions.env') }}

      - name: Restore pinned native dependencies
        uses: actions/cache@v6
        with:
          # Build directories are intentionally excluded: CMake regenerates them.
          path: third_party/android-deps
          key: android-native-deps-${{ runner.os }}-all-api26-ndk27.0.12077973-${{ hashFiles('scripts/build-android-deps.sh', 'third_party/versions.env', 'third_party/versions.cmake') }}

      - name: Build publication
        run: |
          chmod +x gradlew scripts/build-android-deps.sh
          ./gradlew \
            :kathttp:publishReleasePublicationToMavenLocal \
            --parallel \
            -PandroidNativeDepsJobs=1 \
            -PandroidNativeDepsParallelAbis=2 \
            --stacktrace \
            --no-daemon

      - name: Inspect AAR
        run: |
          AAR="$(find kathttp/build/outputs/aar -name '*.aar' | head -1)"
          test -n "${AAR}"
          unzip -l "${AAR}"

          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            unzip -l "${AAR}" | grep "jni/${abi}/libkathttp.so"
          done

      - name: Upload AAR
        uses: actions/upload-artifact@v7
        with:
          name: kathttp-aar
          path: kathttp/build/outputs/aar/*.aar
