name: Android Build

on:
  pull_request:
    paths:
      - "example/**"
      - "kathttp3/**"
      - "src/**"
      - "include/**"
      - "CMakeLists.txt"
      - "settings.gradle.kts"
      - "build.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "scripts/build-android-deps.sh"
      - "third_party/versions.*"
      - "third_party/patches/**"
      - ".github/workflows/android-build.yml"
  push:
    branches: [main]
    paths:
      - "example/**"
      - "kathttp3/**"
      - "src/**"
      - "include/**"
      - "CMakeLists.txt"
      - "settings.gradle.kts"
      - "build.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "scripts/build-android-deps.sh"
      - "third_party/versions.*"
      - "third_party/patches/**"
      - ".github/workflows/android-build.yml"

permissions:
  contents: read

concurrency:
  group: android-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
            ${{ env.ANDROID_HOME }}/cmake/3.22.1
            third_party/src
            third_party/build-android
            third_party/android-deps
          key: android-native-deps-${{ runner.os }}-${{ hashFiles('third_party/versions.env', 'third_party/versions.cmake', 'third_party/patches/**', 'scripts/build-android-deps.sh') }}
      - run: >-
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          "platforms;android-36" "build-tools;36.0.0"
          "ndk;27.0.12077973" "cmake;3.22.1"
      - name: Build Android library, AAR, and example APK
        run: >-
          ./gradlew --no-daemon --stacktrace
          :kathttp3:testDebugUnitTest :example:testDebugUnitTest
          :kathttp3:lintDebug
          :kathttp3:assembleRelease :example:assembleDebug
          -PandroidNativeDepsJobs=2 -PandroidNativeDepsParallelAbis=2
      - name: Verify release outputs
        run: |
          aar="$(find kathttp3/build/outputs/aar -name '*-release.aar' -print -quit)"
          test -n "$aar"
          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            unzip -Z1 "$aar" | grep -Fx "jni/$abi/libkathttp3.so"
          done
          test -f example/build/outputs/apk/debug/example-debug.apk
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: kathttp3-android-build
          path: |
            kathttp3/build/outputs/aar/*.aar
            example/build/outputs/apk/debug/example-debug.apk
