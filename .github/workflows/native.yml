name: Native

on:
  pull_request:
    paths:
      - "src/**"
      - "include/**"
      - "tests/**"
      - "CMakeLists.txt"
      - "third_party/patches/**"
      - ".clang-format"
      - ".clang-tidy"
      - ".github/workflows/native.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "include/**"
      - "tests/**"
      - "CMakeLists.txt"
      - "third_party/patches/**"
      - ".clang-format"
      - ".clang-tidy"
      - ".github/workflows/native.yml"
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

concurrency:
  group: native-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: sudo apt-get update -qq && sudo apt-get install -y clang-format
      - run: >-
          find src include tests -type f ! -name ca_bundle.h \( -name '*.cc' -o -name '*.cpp' -o -name '*.c' -o -name '*.h' -o -name '*.hpp' \) -print0 |
          xargs -0 clang-format --dry-run --Werror

  core-sanitizers:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address-undefined]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: sudo apt-get update -qq && sudo apt-get install -y cmake ninja-build
      - name: Build and run deterministic C++ state tests
        run: >-
          cmake -S . -B build-${{ matrix.sanitizer }} -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DKATHTTP3_ANALYSIS_ONLY=ON
          -DKATHTTP3_SANITIZE=ON
          -DKATHTTP3_BUILD_JNI=OFF &&
          cmake --build build-${{ matrix.sanitizer }} --parallel &&
          ctest --test-dir build-${{ matrix.sanitizer }} --output-on-failure

  linux-ngtcp2-interop:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install HTTP/3 build prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build pkg-config git openssl libev-dev libbrotli-dev g++-14
      - name: Build ngtcp2 example HTTP/3 server
        run: |
          # v1.17.0 is an annotated tag; fetch its resolved commit and the
          # parser/test submodules required by nghttp3's CMake build.
          git init ../nghttp3
          git -C ../nghttp3 remote add origin https://github.com/ngtcp2/nghttp3.git
          git -C ../nghttp3 fetch --depth 1 origin 06b46ec9189be3a49c78a283b625882d8a6e3237
          git -C ../nghttp3 checkout --detach FETCH_HEAD
          git -C ../nghttp3 submodule update --init --recursive
          cmake -S ../nghttp3 -B ../nghttp3-build -G Ninja -DCMAKE_INSTALL_PREFIX="$PWD/../h3-prefix"
          cmake --build ../nghttp3-build --parallel
          cmake --install ../nghttp3-build
          git init ../boringssl
          git -C ../boringssl remote add origin https://github.com/google/boringssl.git
          git -C ../boringssl fetch --depth 1 origin 3c6315e00ab02d7bc9b8922aff1f85d8f81ee130
          git -C ../boringssl checkout --detach FETCH_HEAD
          cmake -S ../boringssl -B ../boringssl-build -G Ninja -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          cmake --build ../boringssl-build --parallel
          # The BoringSSL archives are deliberately static.  ngtcp2's CMake
          # symbol probes link them with the C linker, which is not reliable
          # for this pinned C++ archive.  Assert the two required declarations
          # in the fixed source and seed the corresponding CMake cache values.
          grep -q '^#define OPENSSL_IS_BORINGSSL' ../boringssl/include/openssl/base.h
          grep -q 'SSL_set_quic_early_data_context' ../boringssl/include/openssl/ssl.h
          git clone --depth 1 --branch v1.24.0 --recurse-submodules https://github.com/ngtcp2/ngtcp2.git ../ngtcp2
          cmake -S ../ngtcp2 -B ../ngtcp2-build -G Ninja -DCMAKE_CXX_COMPILER=g++-14 -DCMAKE_INSTALL_PREFIX="$PWD/../quic-prefix" -DENABLE_EXAMPLES=ON -DENABLE_OPENSSL=OFF -DENABLE_BORINGSSL=ON \
            -DHAVE_BORINGSSL=1 -DHAVE_SSL_SET_QUIC_EARLY_DATA_CONTEXT=1 \
            -DBORINGSSL_INCLUDE_DIR="$PWD/../boringssl/include" \
            -DBORINGSSL_LIBRARIES="$PWD/../boringssl-build/libssl.a;$PWD/../boringssl-build/libcrypto.a" \
            -DLIBNGHTTP3_INCLUDE_DIR="$PWD/../h3-prefix/include" \
            -DLIBNGHTTP3_LIBRARY="$PWD/../h3-prefix/lib/libnghttp3.so"
          cmake --build ../ngtcp2-build --parallel
          cmake --install ../ngtcp2-build
          SERVER="$(find ../ngtcp2-build/examples -maxdepth 1 -type f \( -name bsslserver -o -name wsslserver \) -perm -111 | head -1)"
          test -n "$SERVER"
          echo "NGTCP2_SERVER=$SERVER" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$PWD/../quic-prefix/lib/pkgconfig:$PWD/../h3-prefix/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$PWD/../quic-prefix/lib:$PWD/../h3-prefix/lib:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
      - name: Build KatHttp3 interop client
        run: >-
          cmake -S . -B build-interop -G Ninja
          -DKATHTTP3_USE_BORINGSSL=ON
          -DKATHTTP3_BORINGSSL_INCLUDE_DIR="$PWD/../boringssl/include"
          -DKATHTTP3_BORINGSSL_LIBRARIES="$PWD/../boringssl-build/libssl.a;$PWD/../boringssl-build/libcrypto.a"
          -DKATHTTP3_BUILD_INTEROP_CLIENT=ON
          -DKATHTTP3_BUILD_TESTS=OFF &&
          cmake --build build-interop --parallel
      - name: Exercise KatHttp3 against ngtcp2 HTTP/3
        run: |
          mkdir cert
          mkdir interop-htdocs
          printf 'KatHttp3 ngtcp2 interoperability fixture\n' > interop-htdocs/index.html
          openssl req -x509 -newkey rsa:2048 -nodes -days 1 -subj /CN=localhost \
            -keyout cert/server.key -out cert/server.crt
          "$NGTCP2_SERVER" --htdocs="$PWD/interop-htdocs" 127.0.0.1 4433 cert/server.key cert/server.crt >server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true; cat server.log' EXIT
          sleep 1
          ./build-interop/kathttp3_test_client --url https://localhost:4433/ --ca-cert cert/server.crt

  static-analysis:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
            ${{ env.ANDROID_HOME }}/cmake/3.22.1
            third_party/src
            third_party/build-android
            third_party/android-deps
          key: native-deps-${{ runner.os }}-${{ hashFiles('third_party/versions.env', 'third_party/versions.cmake', 'third_party/patches/**', 'scripts/build-android-deps.sh') }}
      - run: >-
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          "ndk;27.0.12077973" "cmake;3.22.1"
      - run: ./gradlew --no-daemon buildAndroidNativeDeps -PandroidNativeDepsAbi=x86_64 -PandroidNativeDepsJobs=2
      - run: sudo apt-get update -qq && sudo apt-get install -y clang clang-tidy cppcheck cmake ninja-build
      - run: >-
          cmake -S . -B build-tidy -G Ninja
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DKATHTTP3_ANALYSIS_ONLY=ON
          -DKATHTTP3_ANALYSIS_DEPS_INCLUDE_DIR=${{ github.workspace }}/third_party/android-deps/x86_64/include
          -DKATHTTP3_BUILD_JNI=OFF
      - name: Run clang-tidy and retain its report
        run: |
          set -o pipefail
          run-clang-tidy -p build-tidy -quiet 2>&1 | tee clang-tidy.log
      - name: Run cppcheck and retain its report
        run: |
          set -o pipefail
          cppcheck --project=build-tidy/compile_commands.json \
            --enable=warning,performance,portability \
            --inline-suppr --suppress=missingIncludeSystem --error-exitcode=1 \
            2>&1 | tee cppcheck.log
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: native-static-analysis-logs
          path: |
            clang-tidy.log
            cppcheck.log
          if-no-files-found: ignore

  thread-sanitizer-nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: sudo apt-get update -qq && sudo apt-get install -y cmake ninja-build
      - name: Long-running lifecycle state test under TSan
        run: >-
          cmake -S . -B build-tsan -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DKATHTTP3_ANALYSIS_ONLY=ON
          -DKATHTTP3_THREAD_SANITIZE=ON
          -DKATHTTP3_BUILD_JNI=OFF &&
          cmake --build build-tsan --parallel &&
          ctest --test-dir build-tsan --output-on-failure --repeat until-fail:100

  fuzz-nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: sudo apt-get update -qq && sudo apt-get install -y clang cmake ninja-build
      - run: >-
          cmake -S . -B build-fuzz -G Ninja
          -DCMAKE_CXX_COMPILER=clang++
          -DKATHTTP3_ANALYSIS_ONLY=ON
          -DKATHTTP3_BUILD_FUZZERS=ON
          -DKATHTTP3_BUILD_TESTS=OFF &&
          cmake --build build-fuzz --parallel
      - run: |
          ./build-fuzz/kathttp3_fuzz_url_and_headers -max_total_time=120
          ./build-fuzz/kathttp3_fuzz_request_body -max_total_time=120
